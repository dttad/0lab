name: Build and push whois-api

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    # Zot registry is installed "on this host", so this expects a self-hosted runner on that host
    # (or at least with network access to the Zot endpoint).
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${ZOT_REGISTRY:-}"
          REPOSITORY="${ZOT_REPOSITORY:-whois-api}"
          if [ -z "$REGISTRY" ]; then
            echo "ZOT_REGISTRY secret is required and must point to the actual Zot host reachable from the runner." >&2
            exit 1
          fi
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/$REPOSITORY" >> "$GITHUB_OUTPUT"
        env:
          ZOT_REGISTRY: ${{ secrets.ZOT_REGISTRY }}
          ZOT_REPOSITORY: ${{ secrets.ZOT_REPOSITORY }}

      - name: Show resolved image target
        run: |
          echo "Registry: ${{ steps.meta.outputs.registry }}"
          echo "Image: ${{ steps.meta.outputs.image }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./whois-api
          file: ./whois-api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Verify pushed tags
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:latest"
          docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:${{ github.sha }}"
