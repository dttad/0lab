# ─── Shell ────────────────────────────────────────────────────────────────────
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# ─── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g mouse on

# ─── Prefix: Ctrl+b (default) ────────────────────────────────────────────────
unbind C-a
set -g prefix C-b
bind C-b send-prefix

# ─── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── Splits: | and - (intuitive) ──────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation: Alt+arrow (no prefix needed) ───────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Vim-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane resize: Ctrl+arrow (no prefix needed) ───────────────────────────────
bind -n C-Left  resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up    resize-pane -U 5
bind -n C-Down  resize-pane -D 5

# ─── Window navigation: Shift+arrow (no prefix) ───────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ─── Window navigation: Alt+number (no prefix) ────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ─── Rename window / pane ─────────────────────────────────────────────────────
bind W command-prompt -p "Rename window:" "rename-window '%%'"
bind P command-prompt -p "Rename pane:"   "select-pane -T '%%'"
bind -n F2 command-prompt -I "#W" "rename-window '%%'"
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# ─── Copy mode (vi keys) ──────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ─── Status bar refresh interval ──────────────────────────────────────────────
set -g status-interval 2

# ─── Colors: Catppuccin Mocha ─────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# ─── Left: session name ───────────────────────────────────────────────────────
set -g status-left-length 30
set -g status-left "#[bg=#b4befe,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#b4befe]"

# ─── Right: net ↓↑ | CPU% | MEM% | date/time ─────────────────────────────────
set -g status-right-length 120
set -g status-right "\
#[fg=#a6e3a1]#(~/.tmux/scripts/netspeed.sh)\
#[fg=#313244]│\
#[fg=#fab387]#(~/.tmux/scripts/cpubar.sh 3) #[fg=#f38ba8]#(~/.tmux/scripts/cputemp.sh) #[fg=#7f849c]#(~/.tmux/scripts/fanrpm.sh)\
#[fg=#313244]│\
#[fg=#cba6f7]#(~/.tmux/scripts/membar.sh 3)\
#[fg=#313244]│\
#[fg=#89b4fa,bold]#(hostname -s)\
#[fg=#313244]│\
#[fg=#7f849c]%d %b #[fg=#cdd6f4,bold]%H:%M"

# ─── Window list ──────────────────────────────────────────────────────────────
set -g status-justify left
setw -g window-status-format         "#[fg=#7f849c] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold,underscore,us=#89b4fa] #I:#W*#{?window_zoomed_flag, Z,} "
setw -g window-status-separator      ""

# ─── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#313244,bg=#1e1e2e"
set -g pane-active-border-style "fg=#89b4fa,bg=#1e1e2e"

# ─── Command / message line ───────────────────────────────────────────────────
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"

# ─── "+" button in status bar → new window ────────────────────────────────────
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist fg=#a6e3a1,bold] + #[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
bind -n MouseDown1StatusDefault new-window -c "#{pane_current_path}"

# ─── Activity alerts ──────────────────────────────────────────────────────────
setw -g monitor-activity on
set  -g visual-activity off
setw -g window-status-activity-style "fg=#f38ba8,bold"
