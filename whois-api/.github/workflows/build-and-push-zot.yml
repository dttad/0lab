name: build-and-push-zot

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    # Zot registry is installed "on this host", so this expects a self-hosted runner on that host
    # (or at least with network access to the Zot endpoint).
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${ZOT_REGISTRY:-localhost:5000}"
          REPOSITORY="${ZOT_REPOSITORY:-whois-api}"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/$REPOSITORY" >> "$GITHUB_OUTPUT"
        env:
          ZOT_REGISTRY: ${{ secrets.ZOT_REGISTRY }}
          ZOT_REPOSITORY: ${{ secrets.ZOT_REPOSITORY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
